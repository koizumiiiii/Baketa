# Supabase Free tierの自動pause防止用キープアライブ
# 数日おきにDBへ軽いリクエストを送り「活動あり」状態を維持してauto-pauseを防ぐ
# Required GitHub Secrets:
# - SUPABASE_URL                   例: https://<project-ref>.supabase.co
# - SUPABASE_SERVICE_ROLE_KEY      anon(public)キーでも可。疎通できればpause回避目的は達成される

name: Supabase Keepalive

on:
  schedule:
    - cron: "0 3 */2 * *"
  workflow_dispatch:

jobs:
  keepalive:
    name: Keep Supabase active
    runs-on: ubuntu-latest

    steps:
      - name: Request profiles table
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail

          status_code="$(
            curl --silent --show-error --output /dev/null \
              --write-out "%{http_code}" \
              --header "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
              --header "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              "${SUPABASE_URL}/rest/v1/profiles?select=id&limit=1"
          )"

          echo "Supabase keepalive HTTP status: ${status_code}"

          if [[ ! "${status_code}" =~ ^2[0-9][0-9]$ ]]; then
            exit 1
          fi
