<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baketa - Processing...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 48px;
            max-width: 480px;
            width: 100%;
            text-align: center;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .logo {
            font-size: 28px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 8px;
        }
        h1 {
            color: #333;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }
        .error {
            display: none;
            background: #fff3f3;
            border: 1px solid #ffcdd2;
            border-radius: 8px;
            padding: 16px;
            margin-top: 20px;
        }
        .error p {
            color: #c62828;
        }
    </style>
    <script>
        (function() {
            'use strict';

            // Get language from URL parameter or browser
            var SUPPORTED_LANGUAGES = ['ja', 'en', 'ko', 'zh-CN', 'zh-TW', 'fr', 'de', 'it', 'es', 'pt'];
            function getLanguage() {
                const params = new URLSearchParams(window.location.search);
                const langParam = params.get('lang');
                if (langParam && SUPPORTED_LANGUAGES.includes(langParam)) {
                    return langParam;
                }
                const hashParams = new URLSearchParams(window.location.hash.substring(1));
                const hashLang = hashParams.get('lang');
                if (hashLang && SUPPORTED_LANGUAGES.includes(hashLang)) {
                    return hashLang;
                }
                const browserLang = navigator.language || navigator.userLanguage;
                if (SUPPORTED_LANGUAGES.includes(browserLang)) return browserLang;
                const prefix = browserLang.split('-')[0];
                if (prefix === 'zh') return (browserLang.includes('TW') || browserLang.includes('Hant')) ? 'zh-TW' : 'zh-CN';
                var match = SUPPORTED_LANGUAGES.find(function(l) { return l === prefix; });
                if (match) return match;
                return 'en';
            }

            const lang = getLanguage();

            // URL fragment parameters
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const type = params.get('type');

            // Debug
            console.log('[Baketa Auth Router] type:', type);
            console.log('[Baketa Auth Router] hash:', hash);
            console.log('[Baketa Auth Router] lang:', lang);

            // Base path (for Cloudflare Pages with custom domain)
            const basePath = '/auth';

            // Type-based routing map
            const routes = {
                'signup': '/confirm/',
                'invite': '/invite/',
                'magiclink': '/magic-link/',
                'email_change': '/email-changed/',
                'recovery': '/reset-password/'
            };

            // Add lang parameter to hash if not present
            function addLangToHash(hash, lang) {
                const hashParams = new URLSearchParams(hash);
                if (!hashParams.has('lang')) {
                    hashParams.set('lang', lang);
                }
                return '#' + hashParams.toString();
            }

            // Execute routing
            if (type && routes[type]) {
                const newHash = addLangToHash(hash, lang);
                const targetUrl = basePath + routes[type] + newHash;
                console.log('[Baketa Auth Router] Redirecting to:', targetUrl);
                window.location.replace(targetUrl);
            } else if (type) {
                // Unknown type - fallback to confirm
                console.warn('[Baketa Auth Router] Unknown type:', type, '- falling back to confirm');
                const newHash = addLangToHash(hash, lang);
                window.location.replace(basePath + '/confirm/' + newHash);
            } else if (hash) {
                // No type but has hash - fallback to confirm
                console.warn('[Baketa Auth Router] No type found - falling back to confirm');
                const newHash = addLangToHash(hash, lang);
                window.location.replace(basePath + '/confirm/' + newHash);
            }
            // If no hash, display this page (error state)
        })();
    </script>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <div class="logo">Baketa</div>
        <h1 id="title">Authenticating...</h1>
        <p id="subtitle">Please wait a moment while we redirect you.</p>

        <div class="error" id="errorMessage">
            <p id="error-text">Redirect failed.<br>Please close this page and try the link in your email again.</p>
        </div>
    </div>

    <script src="../shared/i18n.js"></script>
    <script>
        const translations = {
            ja: {
                title: '認証処理中...',
                subtitle: '自動的にリダイレクトされます。<br>しばらくお待ちください。',
                errorText: 'リダイレクトに失敗しました。<br>このページを閉じて、再度メール内のリンクをクリックしてください。'
            },
            en: {
                title: 'Authenticating...',
                subtitle: 'Please wait a moment while we redirect you.',
                errorText: 'Redirect failed.<br>Please close this page and try the link in your email again.'
            },
            ko: {
                title: '인증 처리 중...',
                subtitle: '자동으로 리다이렉트됩니다.<br>잠시만 기다려 주세요.',
                errorText: '리다이렉트에 실패했습니다.<br>이 페이지를 닫고 이메일의 링크를 다시 클릭해 주세요.'
            },
            'zh-CN': {
                title: '正在验证...',
                subtitle: '正在自动跳转。<br>请稍候。',
                errorText: '跳转失败。<br>请关闭此页面，重新点击邮件中的链接。'
            },
            'zh-TW': {
                title: '正在驗證...',
                subtitle: '正在自動跳轉。<br>請稍候。',
                errorText: '跳轉失敗。<br>請關閉此頁面，重新點擊郵件中的連結。'
            },
            fr: {
                title: 'Authentification en cours...',
                subtitle: 'Vous allez être redirigé automatiquement.<br>Veuillez patienter.',
                errorText: 'La redirection a échoué.<br>Veuillez fermer cette page et cliquer à nouveau sur le lien dans votre email.'
            },
            de: {
                title: 'Authentifizierung läuft...',
                subtitle: 'Sie werden automatisch weitergeleitet.<br>Bitte warten Sie einen Moment.',
                errorText: 'Weiterleitung fehlgeschlagen.<br>Bitte schließen Sie diese Seite und klicken Sie erneut auf den Link in Ihrer E-Mail.'
            },
            it: {
                title: 'Autenticazione in corso...',
                subtitle: 'Verrai reindirizzato automaticamente.<br>Attendi un momento.',
                errorText: 'Reindirizzamento fallito.<br>Chiudi questa pagina e clicca nuovamente sul link nell\'email.'
            },
            es: {
                title: 'Autenticando...',
                subtitle: 'Serás redirigido automáticamente.<br>Por favor espera un momento.',
                errorText: 'La redirección ha fallado.<br>Cierra esta página e intenta el enlace del correo de nuevo.'
            },
            pt: {
                title: 'Autenticando...',
                subtitle: 'Você será redirecionado automaticamente.<br>Por favor, aguarde.',
                errorText: 'O redirecionamento falhou.<br>Feche esta página e tente o link do email novamente.'
            }
        };

        // Use getLanguage() and applyTranslations logic from shared/i18n.js
        (function() {
            const lang = getLanguage();
            const t = translations[lang] || translations['en'];

            document.documentElement.lang = lang;
            document.getElementById('title').textContent = t.title;
            document.getElementById('subtitle').innerHTML = t.subtitle;
            document.getElementById('error-text').innerHTML = t.errorText;
        })();

        // Show error if not redirected after 3 seconds
        setTimeout(function() {
            if (window.location.pathname.includes('/callback/')) {
                document.getElementById('errorMessage').style.display = 'block';
                document.querySelector('.spinner').style.display = 'none';
            }
        }, 3000);
    </script>
</body>
</html>
